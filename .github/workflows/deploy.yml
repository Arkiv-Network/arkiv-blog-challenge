name: Deploy to GitHub Pages

on:
  # Trigger the workflow every time you push to the `main` branch
  # Using a different branch name? Replace `main` with your branch’s name
  push:
    branches: [main]
  # Allows you to run this workflow manually from the Actions tab on GitHub.
  workflow_dispatch:

# Allow this job to clone the repo and create a page deployment
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Base URL path the apps are served from on GitHub Pages.
      # Change this here if the repo (and therefore the Pages URL) is renamed.
      PAGES_BASE_PATH: /arkiv-blog-challenge
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install tutorial sketch app dependencies
        working-directory: tutorial-source-code/metamask-tutorial
        run: npm install
      - name: Build tutorial sketch app
        working-directory: tutorial-source-code/metamask-tutorial
        run: npm run build -- --base=${{ env.PAGES_BASE_PATH }}/sketch/

      - name: Install blog app dependencies
        working-directory: tutorial-source-code/blog-app
        run: npm install
      - name: Build blog app
        working-directory: tutorial-source-code/blog-app
        run: npm run build -- --base=${{ env.PAGES_BASE_PATH }}/blog/

      - name: Assemble combined Pages artifact
        run: |
          mkdir -p public-site/sketch public-site/blog
          cp -r tutorial-source-code/metamask-tutorial/dist/* public-site/sketch/
          cp -r tutorial-source-code/blog-app/dist/* public-site/blog/
          cp .github/pages-index.html public-site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public-site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
